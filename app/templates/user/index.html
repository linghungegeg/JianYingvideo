    <script>


        // ---------- ???? ----------


        const themeToggle = document.getElementById('themeToggle');


        const themeSlider = document.getElementById('themeSlider');


        themeToggle.addEventListener('click', () => {


            document.body.classList.toggle('light-mode');


            if (document.body.classList.contains('light-mode')) {


                themeSlider.className = 'theme-slider light';


            } else {


                themeSlider.className = 'theme-slider dark';


            }


        });





        // ---------- ???? ----------


        fetch('/api/site-settings')


            .then(res => res.json())


            .then(settings => {


                document.getElementById('dynamicTitle').textContent = settings.title;


                document.getElementById('dynamicKeywords').setAttribute('content', settings.keywords);


                document.getElementById('dynamicDescription').setAttribute('content', settings.description);


            })


            .catch(err => console.warn('????????', err));





        // ---------- ???? ----------


        const navItems = document.getElementById('navItems');


        let currentActiveMenu = null;


        let currentActiveSub = null;





        // жҫ¶еӢӯжӮҠж¶“вӮ¬з»ҫСҶеҪҚйҚ—жӣ еҒЈйҚ‘дјҷзҙҷйҸғзҠІз“ҷй‘ҝж»ғеҙҹй”ӣ?


        navItems.querySelectorAll('.nav-item:not(.has-sub)').forEach(item => {


            item.addEventListener('click', () => {


                const menu = item.dataset.menu;


                const url = item.dataset.url;


                if (!url) return;


                // з»үе©ҡж«ҺйҺөвӮ¬йҸҲеӨүз«ҙз»ҫСҶеҪҚйҚ—жӣ ж®‘active


                navItems.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));


                item.classList.add('active');


                // жҝЎеӮӣзҒүйҸҲеӨҠзқҚеҜ®вӮ¬йҗЁеӢ«з“ҷй‘ҝж»ғеҙҹй”ӣеұҫе§ҢйҚҷ?


                navItems.querySelectorAll('.nav-item.has-sub').forEach(n => n.classList.remove('expanded'));


                // еЁ“е‘ҙж«ҺзҖӣж„ҜеҪҚйҚ—жҳҰctive


                if (currentActiveSub) {


                    currentActiveSub.classList.remove('active');


                    currentActiveSub = null;


                }


                currentActiveMenu = menu;


                loadContent(url);


            });


        });





        // жҫ¶еӢӯжӮҠйҸҲеӨҠз“ҷй‘ҝж»ғеҙҹйҗЁеӢӘз«ҙз»ҫСҶеҪҚйҚ—жӣӘзҙҷйҗҗз‘°еҡ®зҒһжӣһзҙ‘/йҺ¶жЁәеҪ”й”ӣ?


        navItems.querySelectorAll('.nav-item.has-sub > .parent').forEach(parent => {


            parent.addEventListener('click', (e) => {


                const navItem = parent.closest('.nav-item');


                // йҚ’еӣЁеҙІзҒһжӣһзҙ‘йҗҳиҲөвӮ¬?


                navItem.classList.toggle('expanded');


                // ??????????


            });


        });





        // жҫ¶еӢӯжӮҠзҖӣж„ҜеҪҚйҚ—жӣ еҒЈйҚ‘?


        navItems.querySelectorAll('.sub-item').forEach(sub => {


            sub.addEventListener('click', (e) => {


                e.stopPropagation();


                const menu = sub.dataset.menu;


                const url = sub.dataset.url;


                if (!url) return;


                // з»үе©ҡж«ҺйҺөвӮ¬йҸҲеӨүз«ҙз»ҫСҶеҪҚйҚ—жӣ ж®‘active


                navItems.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));


                // з»үе©ҡж«ҺйҺөвӮ¬йҸҲеӨҠз“ҷй‘ҝж»ғеҙҹйҗЁеҲҹctive


                navItems.querySelectorAll('.sub-item').forEach(s => s.classList.remove('active'));


                sub.classList.add('active');


                // йҗ–еүҒйӘҮжҘӮжЁ№еҜ’й”ӣзҶ·еҪІжө гғ§зІ°йҗ–еүҒйӘҮйҚ”зҮјctiveжөЈе—•з¬үиӨ°еҚһжҗ·зҒһжӣһзҙ‘


                const parentItem = sub.closest('.nav-item');


                parentItem.classList.add('active');


                parentItem.classList.add('expanded'); // ???????


                // з’Ғжқҝз¶ҚиӨ°ж’іеў е©өвӮ¬еЁІиҚӨж®‘зҖӣж„ҜеҪҚйҚ—?


                currentActiveSub = sub;


                currentActiveMenu = menu;


                loadContent(url);


            });


        });





        // ????????


        window.onload = () => {


            const dashboardItem = document.querySelector('.nav-item[data-menu="dashboard"]');


            if (dashboardItem) {


                dashboardItem.classList.add('active');


                loadContent(dashboardItem.dataset.url);


            }


        };





        // ---------- ???? ----------


        function loadContent(url) {


            const contentDiv = document.getElementById('dynamicContent');


            contentDiv.innerHTML = '<div class="card">???...</div>';


            fetch(url)


                .then(res => res.text())


                .then(html => {


                    contentDiv.innerHTML = html;


                    // ?????????


                    Array.from(contentDiv.querySelectorAll('script')).forEach(oldScript => {


                        const newScript = document.createElement('script');


                        Array.from(oldScript.attributes).forEach(attr => {


                            newScript.setAttribute(attr.name, attr.value);


                        });


                        newScript.appendChild(document.createTextNode(oldScript.innerHTML));


                        oldScript.parentNode.replaceChild(newScript, oldScript);


                    });


                })


                .catch(err => {


                    contentDiv.innerHTML = `<div class="card flash-error">????: ${err.message}</div>`;


                });


        }





        // ??????


        window.refreshCurrentContent = function() {


            if (currentActiveSub) {


                loadContent(currentActiveSub.dataset.url);


            } else {


                const activeItem = document.querySelector('.nav-item.active:not(.has-sub)');


                if (activeItem && activeItem.dataset.url) {


                    loadContent(activeItem.dataset.url);


                }


            }


        };
