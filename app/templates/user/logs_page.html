<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成记录</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .wrap {
            max-width: 1160px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
        }

        .sub {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 6px;
            line-height: 1.7;
        }

        .btn {
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #334155;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 13px;
        }

        .table-wrap {
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
            background: #1e293b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #0f172a;
            color: #94a3b8;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            white-space: nowrap;
        }

        .ok {
            background: #05966920;
            color: #34d399;
            border: 1px solid #059669;
        }

        .fail {
            background: #dc262620;
            color: #f87171;
            border: 1px solid #dc2626;
        }

        .empty {
            padding: 18px;
            color: #94a3b8;
            font-size: 13px;
        }

        .muted {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <div>
                <div class="title">生成记录</div>
                <div class="sub">普通用户只能查看自己的任务记录，管理员可查看全部记录。这里保留为纯列表页，便于快速排查失败任务。</div>
            </div>
            <button class="btn" type="button" id="refreshBtn">刷新</button>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>模板 / 草稿</th>
                        <th>状态</th>
                        <th>生成结果</th>
                        <th>错误信息</th>
                        <th>用户</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr><td colspan="6" class="empty">正在加载记录...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        async function loadLogs() {
            const body = document.getElementById("logsBody");
            body.innerHTML = '<tr><td colspan="6" class="empty">正在加载记录...</td></tr>';

            try {
                const res = await fetch("/api/logs");
                const logs = await res.json();

                if (!Array.isArray(logs) || logs.length === 0) {
                    body.innerHTML = '<tr><td colspan="6" class="empty">暂时没有生成记录。</td></tr>';
                    return;
                }

                body.innerHTML = logs.map((log) => {
                    const success = ["success", "finished"].includes(log.status);
                    const source = escapeHtml(log.template_name || log.template_path || "-");
                    const draft = escapeHtml(log.draft_name || log.output_name || "-");
                    const errorMsg = escapeHtml(log.error_msg || "-");
                    const username = escapeHtml(log.username || "-");
                    const createdAt = escapeHtml(log.created_at || "-");

                    return `
                        <tr>
                            <td>${source}</td>
                            <td><span class="badge ${success ? "ok" : "fail"}">${success ? "成功" : "失败"}</span></td>
                            <td>${draft}</td>
                            <td class="muted">${errorMsg}</td>
                            <td>${username}</td>
                            <td>${createdAt}</td>
                        </tr>
                    `;
                }).join("");
            } catch (error) {
                body.innerHTML = '<tr><td colspan="6" class="empty">读取记录失败，请稍后重试。</td></tr>';
            }
        }

        document.getElementById("refreshBtn").addEventListener("click", loadLogs);
        loadLogs();
    </script>
</body>
</html>
