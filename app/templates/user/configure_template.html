<!DOCTYPE html><html lang="zh-CN"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>模板配置 - 剪映助手</title>    <style>        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }        body { background-color: #f5f7fa; padding: 20px; display: flex; justify-content: center; }        .container { max-width: 800px; width: 100%; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; }        h1 { font-size: 24px; border-left: 5px solid #3b82f6; padding-left: 16px; margin-bottom: 24px; }        .info-box { background-color: #eef2ff; border-radius: 12px; padding: 16px; margin-bottom: 24px; }        .form-group { margin-bottom: 24px; }        label { display: block; font-weight: 500; margin-bottom: 8px; }        textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: monospace; min-height: 120px; }        .hint { font-size: 13px; color: #64748b; margin-top: 6px; }        .btn { background-color: #3b82f6; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; width: 100%; }        .btn:hover { background-color: #2563eb; }        .message { margin-top: 16px; padding: 12px; border-radius: 8px; display: none; }        .message.success { background-color: #d1fae5; color: #065f46; display: block; }        .message.error { background-color: #fee2e2; color: #991b1b; display: block; }    </style></head><body>    <div class="container">        <h1>⚙️ 模板配置</h1>        <div class="info-box">            <p><strong>模板ID：</strong> <span id="templateId">{{ template.id }}</span></p>            <p><strong>模板名称：</strong> {{ template.name }}</p>            <p><strong>草稿路径：</strong> {{ template.template_path }}</p>        </div>        <form id="configForm">            <div class="form-group">                <label>📁 素材文件名列表（每行一个）</label>                <textarea id="materials" placeholder="例如：&#10;镜头1.jpg&#10;镜头2.mp4">{{ materials_text }}</textarea>                <div class="hint">这些文件名将显示给用户，用户需要按此准备同名文件夹。</div>            </div>            <div class="form-group">                <label>📝 原文字列表（每行一段，按顺序对应模板中的文字）</label>                <textarea id="originalTexts" placeholder="例如：&#10;朝来寒雨几回眸&#10;你在哪一方停留">{{ original_texts }}</textarea>                <div class="hint">请按顺序输入模板中实际显示的文字内容，用于生成时精确替换。每行一段。</div>            </div>            <button type="submit" class="btn" id="saveBtn">保存配置</button>        </form>        <div id="message" class="message"></div>    </div>    <script>        const templateId = {{ template.id }};        document.getElementById('configForm').addEventListener('submit', async (e) => {            e.preventDefault();            const materials = document.getElementById('materials').value.split('\n').map(s => s.trim()).filter(s => s);            const texts = document.getElementById('originalTexts').value.split('\n').map(s => s.trim()).filter(s => s);            const response = await fetch(`/api/template/${templateId}/configure`, {                method: 'POST',                headers: { 'Content-Type': 'application/json' },                body: JSON.stringify({ materials, texts })            });            const result = await response.json();            const msgDiv = document.getElementById('message');            if (result.status === 'ok') {                msgDiv.className = 'message success';                msgDiv.innerHTML = '✅ 配置保存成功！';            } else {                msgDiv.className = 'message error';                msgDiv.innerHTML = '❌ 保存失败: ' + (result.error || '未知错误');            }        });    </script></body></html>
