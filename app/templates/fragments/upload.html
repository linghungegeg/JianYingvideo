<div class="card">
    <div class="page-title">📤 上传骨架</div>
    <form id="uploadForm" enctype="multipart/form-data">
        <div class="form-group">
            <label>模板名称 <span style="color:red;">*</span></label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>分类</label>
            <input type="text" name="category" class="form-control">
        </div>
        <div class="form-group">
            <label>标签（逗号分隔）</label>
            <input type="text" name="tags" class="form-control">
        </div>
        <div class="form-group">
            <label>骨架 JSON 文件 <span style="color:red;">*</span></label>
            <input type="file" name="json_file" accept=".json" class="form-control" required>
        </div>
        <div class="form-group">
            <label>预览图（可选）</label>
            <input type="file" name="preview" accept="image/*" class="form-control">
        </div>
        <button type="submit" class="btn">上传</button>
    </form>
</div>
<script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const result = await res.json();
        if (result.success) {
            alert('上传成功');
            // 切换到模板管理页面
            const templatesSub = document.querySelector('.sub-item[data-menu="templates"]');
            if (templatesSub) templatesSub.click();
        } else {
            alert('上传失败: ' + result.error);
        }
    });
</script>
