<div class="card">
    <div class="page-title">?? 站点设置</div>
    <form id="siteForm">
        <div class="form-group">
            <label>网站标题</label>
            <input type="text" name="title" id="title" class="form-control" required>
        </div>
        <div class="form-group">
            <label>关键词（逗号分隔）</label>
            <input type="text" name="keywords" id="keywords" class="form-control">
        </div>
        <div class="form-group">
            <label>网站描述</label>
            <textarea name="description" id="description" rows="3" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn">保存</button>
    </form>
</div>
<script>
    async function loadSettings() {
        const res = await fetch('/api/site-settings');
        const settings = await res.json();
        document.getElementById('title').value = settings.title;
        document.getElementById('keywords').value = settings.keywords;
        document.getElementById('description').value = settings.description;
    }
    document.getElementById('siteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const res = await fetch('/api/site-settings', { method: 'POST', body: formData });
        const result = await res.json();
        if (result.success) {
            alert('保存成功');
            // 更新页面标题和元数据
            const settings = await (await fetch('/api/site-settings')).json();
            document.getElementById('dynamicTitle').textContent = settings.title;
            document.getElementById('dynamicKeywords').setAttribute('content', settings.keywords);
            document.getElementById('dynamicDescription').setAttribute('content', settings.description);
        } else {
            alert('保存失败');
        }
    });
    loadSettings();
</script>
