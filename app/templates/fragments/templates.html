<div class="card">    <div class="page-title">?? 模板管理</div>    <table class="table" id="templatesTable">        <thead>            <tr><th>ID</th><th>名称</th><th>分类</th><th>标签</th><th>时长</th><th>生成数</th><th>状态</th><th>操作</th></tr>        </thead>        <tbody></tbody>    </table></div><script>    async function loadTemplates() {        const res = await fetch('/api/templates');        const templates = await res.json();        const tbody = document.querySelector('#templatesTable tbody');        tbody.innerHTML = templates.map(t => `            <tr>                <td>#${t.id}</td>                <td>${t.name}</td>                <td>${t.category || '-'}</td>                <td>${(t.tags || []).map(tag => `<span class="badge">${tag}</span>`).join(' ')}</td>                <td>${t.duration}秒</td>                <td>${t.generate_count}</td>                <td><span class="badge ${t.status ? 'badge-success' : 'badge-danger'}">${t.status ? '启用' : '禁用'}</span></td>                <td class="action-links">                    <button class="btn btn-secondary btn-view" data-id="${t.id}">查看</button>                    <button class="btn btn-generate" data-id="${t.id}">生成</button>                    <button class="btn btn-secondary btn-toggle" data-id="${t.id}">${t.status ? '禁用' : '启用'}</button>                    <button class="btn btn-danger btn-delete" data-id="${t.id}">删除</button>                </td>            </tr>        `).join('');        // 绑定查看        document.querySelectorAll('.btn-view').forEach(btn => {            btn.addEventListener('click', () => viewTemplate(btn.dataset.id));        });        // 绑定生成        document.querySelectorAll('.btn-generate').forEach(btn => {            btn.addEventListener('click', () => generateTemplate(btn.dataset.id));        });        // 绑定切换        document.querySelectorAll('.btn-toggle').forEach(btn => {            btn.addEventListener('click', () => toggleTemplate(btn.dataset.id));        });        // 绑定删除        document.querySelectorAll('.btn-delete').forEach(btn => {            btn.addEventListener('click', () => deleteTemplate(btn.dataset.id));        });    }    async function viewTemplate(id) {        const res = await fetch(`/api/template/${id}`);        const data = await res.json();        alert(JSON.stringify(data.json_content, null, 2));    }    async function generateTemplate(id) {        if (!confirm('确定生成草稿？')) return;        const res = await fetch(`/api/generate/${id}`, { method: 'POST' });        const result = await res.json();        if (result.success) {            alert(`生成成功: ${result.draft}`);            window.refreshCurrentContent(); // 刷新当前页面        } else {            alert(`生成失败: ${result.error}`);        }    }    async function toggleTemplate(id) {        const res = await fetch(`/api/toggle/${id}`, { method: 'POST' });        const result = await res.json();        if (result.success) {            window.refreshCurrentContent();        } else {            alert('操作失败');        }    }    async function deleteTemplate(id) {        if (!confirm('确定删除？')) return;        const res = await fetch(`/api/delete/${id}`, { method: 'DELETE' });        const result = await res.json();        if (result.success) {            window.refreshCurrentContent();        } else {            alert('删除失败');        }    }    loadTemplates();</script>
