<div class="card">    <div class="page-title">📁 草稿保存路径</div>    <form id="draftsForm">        <div class="form-group">            <label>剪映草稿文件夹路径</label>            <div class="path-input-group">                <input type="text" name="folder" id="folder" class="form-control" value="{{ folder }}" placeholder="例如 E:\jycaogao\JianyingPro Drafts">                <button type="button" class="btn btn-secondary" id="browseBtn">浏览...</button>            </div>            <small style="color: #94a3b8; display: block; margin-top: 6px;">生成的草稿将保存在此目录下，请确保路径存在且剪映可访问。</small>        </div>        <button type="submit" class="btn">保存</button>    </form></div><script>    async function loadFolder() {        const res = await fetch('/api/drafts-folder');        const data = await res.json();        document.getElementById('folder').value = data.folder;    }    document.getElementById('browseBtn').addEventListener('click', async () => {        const res = await fetch('/api/browse-folder', { method: 'POST' });        const data = await res.json();        if (data.folder) {            document.getElementById('folder').value = data.folder;        }    });    document.getElementById('draftsForm').addEventListener('submit', async (e) => {        e.preventDefault();        const formData = new FormData(e.target);        const res = await fetch('/api/drafts-folder', { method: 'POST', body: formData });        const result = await res.json();        if (result.success) {            alert('保存成功');        } else {            alert('保存失败');        }    });    loadFolder();</script>
